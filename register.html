<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户注册 - 数据生产要素资源运营门户</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <div class="auth-banner">
    <div class="auth-banner-content">
      <h2>数据生产要素资源运营门户</h2>
      <p>注册即享海量数据资源与专业工具</p>
    </div>
  </div>

  <div class="auth-form-panel">
    <div class="auth-card" style="max-height:90vh;overflow-y:auto;">
      <h3>用户注册</h3>
      <form data-validate>
        <div class="form-group">
          <label class="form-label">用户名 <span style="color:#E74C3C;">*</span></label>
          <input type="text" class="form-input" placeholder="4-20位字母、数字或下划线" name="username" data-required>
          <span class="form-error-msg"></span>
        </div>
        <div class="form-group">
          <label class="form-label">邮箱 <span style="color:#E74C3C;">*</span></label>
          <input type="email" class="form-input" placeholder="请输入常用邮箱" name="email" data-required>
          <span class="form-error-msg"></span>
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input type="text" class="form-input" placeholder="请输入手机号" name="phone" data-phone>
          <span class="form-error-msg"></span>
        </div>
        <div class="form-group">
          <label class="form-label">密码 <span style="color:#E74C3C;">*</span></label>
          <input type="password" class="form-input" placeholder="至少6位密码" name="password" data-required data-minlen="6">
          <span class="form-error-msg"></span>
        </div>
        <div class="form-group">
          <label class="form-label">确认密码 <span style="color:#E74C3C;">*</span></label>
          <input type="password" class="form-input" placeholder="请再次输入密码" name="confirm_password" data-required>
          <span class="form-error-msg"></span>
        </div>
        <div class="form-group">
          <label class="form-label">所属行业</label>
          <select class="form-select">
            <option value="">请选择</option>
            <option>政府与公共事业</option>
            <option>金融</option>
            <option>互联网与科技</option>
            <option>制造业</option>
            <option>医疗健康</option>
            <option>教育科研</option>
            <option>交通运输</option>
            <option>能源环保</option>
            <option>其他</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">公司名称</label>
          <input type="text" class="form-input" placeholder="请输入公司全称">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;">注 册</button>
      </form>
      <div class="auth-links">
        已有账号？<a href="admin-login.html">立即登录</a>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
