<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台登陆 - 数据生产要素资源运营门户</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-page">
  <!-- 左侧视觉区 -->
  <div class="auth-banner">
    <div class="auth-banner-content">
      <h2>数据生产要素资源运营门户</h2>
      <p>专业的数据资源管理与运营平台</p>
    </div>
  </div>

  <!-- 右侧登录面板 -->
  <div class="auth-form-panel">
    <div class="auth-card">
      <h3>管理后台登录</h3>

      <!-- 登录方式切换 -->
      <div class="auth-tabs">
        <button class="auth-tab active" data-auth-tab="password">密码登录</button>
        <button class="auth-tab" data-auth-tab="qrcode">扫码登录</button>
      </div>

      <!-- 密码登录 -->
      <div class="auth-panel active" data-auth-panel="password">
        <form data-validate>
          <div class="form-group">
            <label class="form-label">账号</label>
            <input type="text" class="form-input" placeholder="邮箱 / 账号 / 手机号" data-required>
            <span class="form-error-msg"></span>
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" placeholder="请输入登录密码" name="password" data-required data-minlen="6">
            <span class="form-error-msg"></span>
          </div>
          <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;">登 录</button>
        </form>
        <div class="auth-links">
          <a href="#">忘记密码</a>
          <span style="margin:0 8px;">|</span>
          <a href="register.html">用户注册</a>
        </div>
      </div>

      <!-- 扫码登录 -->
      <div class="auth-panel" data-auth-panel="qrcode" style="text-align:center;">
        <div style="width:180px;height:180px;background:#F5F7FA;margin:20px auto;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6B7B8D;font-size:13px;border:1px dashed #DDE2E8;">
          二维码占位
        </div>
        <p style="font-size:13px;color:#6B7B8D;">请使用企业微信扫描二维码</p>
      </div>
    </div>
  </div>
</div>

<script src="main.js"></script>
</body>
</html>
